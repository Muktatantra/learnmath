<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>learnmath</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <button class="theme-toggle" data-action="toggle-theme" aria-label="Toggle dark mode">🌙</button>
  <button class="sync-toggle" data-action="toggle-sync" aria-label="Sync progress across devices">🔗</button>

  <div class="sync-modal" role="dialog" aria-modal="true" aria-label="Sync progress" hidden>
    <div class="sync-modal-content">
      <button class="sync-modal-close" data-action="close-sync" aria-label="Close">&times;</button>
      <h2 class="screen-title">Sync Progress</h2>

      <div class="sync-linked" hidden>
        <p>Your sync code — enter it on another device to continue here.</p>
        <div class="sync-code-value"></div>
        <div class="sync-actions">
          <button class="btn btn-secondary" data-action="copy-sync-code">Copy code</button>
          <button class="btn btn-secondary" data-action="unlink-sync">Unlink this device</button>
        </div>
      </div>

      <div class="sync-unlinked" hidden>
        <p>Get a code to continue your progress on another device.</p>
        <button class="btn btn-primary" data-action="generate-sync-code">Get my sync code</button>

        <p class="sync-divider">Have a code from another device?</p>
        <div class="sync-link-row">
          <input type="text" class="sync-code-input" placeholder="XXXXX-XXXXX" maxlength="11" autocapitalize="characters" autocomplete="off">
          <button class="btn btn-primary" data-action="link-sync-code">Link</button>
        </div>
      </div>

      <div class="sync-message"></div>
    </div>
  </div>

  <section class="screen" data-screen="start">
    <h1 class="title">learnmath</h1>
    <p class="subtitle">Practice addition, subtraction &amp; times tables!</p>
    <button class="btn btn-primary" data-action="play">Play</button>
  </section>

  <section class="screen" data-screen="operation-select" hidden>
    <button class="btn-back" data-action="back-to-start">&larr; Back</button>
    <h2 class="screen-title">Choose an operation</h2>
    <div class="card-grid">
      <button class="op-card op-addition" data-operation="addition">
        <span class="op-symbol">+</span>
        <span class="op-name">Addition</span>
      </button>
      <button class="op-card op-subtraction" data-operation="subtraction">
        <span class="op-symbol">&minus;</span>
        <span class="op-name">Subtraction</span>
      </button>
      <button class="op-card op-multiplication" data-operation="multiplication">
        <span class="op-symbol">&times;</span>
        <span class="op-name">Multiplication</span>
      </button>
    </div>
  </section>

  <section class="screen" data-screen="difficulty-select" hidden>
    <button class="btn-back" data-action="back-to-operations">&larr; Back</button>
    <h2 class="screen-title difficulty-select-title"></h2>
    <div class="difficulty-grid"></div>
  </section>

  <section class="screen" data-screen="level-select" hidden>
    <button class="btn-back" data-action="back-to-difficulty">&larr; Back</button>
    <h2 class="screen-title level-select-title"></h2>
    <div class="level-grid"></div>
  </section>

  <section class="screen" data-screen="game" hidden>
    <div class="game-header">
      <div class="lives"></div>
      <div class="progress"></div>
      <div class="score"></div>
    </div>
    <div class="streak"></div>
    <div class="timer-row">
      <div class="timer-track"><div class="timer-fill"></div></div>
      <div class="timer-label"></div>
    </div>
    <div class="question"></div>
    <div class="choices"></div>
    <div class="feedback"></div>
  </section>

  <section class="screen" data-screen="results" hidden>
    <h2 class="screen-title">Results</h2>
    <div class="results-stars"></div>
    <div class="results-summary"></div>
    <div class="results-actions"></div>
  </section>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
